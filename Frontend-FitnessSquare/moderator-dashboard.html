<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Moderation Dashboard | Fitness Square</title>
    <!-- Fonts & Icons -->
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700;800;900&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <!-- CSS -->
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="css/blog.css">
    <style>
        .moderation-table th {
            font-size: 1.15rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            padding: 15px;
        }
    </style>
</head>

<body class="blog-page">

    <!-- Header -->
    <header id="header">
        <div class="container nav-container">
            <a href="index.html" class="logo">
                <img src="logo.png" alt="Fitness Square Logo" class="logo-img">
                FITNESS <span>SQUARE</span>
            </a>
            <nav class="nav-links">
                <a href="#" id="dashboardLink">Dashboard</a>
                <a href="blog.html">Community</a>
            </nav>
        </div>
    </header>

    <div class="blog-container">
        <div class="blog-header">
            <h1 class="blog-title">Content <span>Moderation</span></h1>
        </div>

        <!-- Moderation Container -->
        <div style="background: var(--blog-card-bg); padding: 30px; border-radius: 16px;">

            <div class="tabs"
                style="margin-bottom: 20px; border-bottom: 1px solid rgba(255,255,255,0.1); display: flex; gap: 20px;">
                <button id="tabPending" class="tab-btn active"
                    style="background: none; border: none; color: white; padding: 10px 0; font-weight: bold; cursor: pointer; border-bottom: 3px solid var(--blog-secondary); font-size: 1.1rem;"
                    onclick="switchModTab('pending')">Pending Posts</button>
                <button id="tabReports" class="tab-btn"
                    style="background: none; border: none; color: grey; padding: 10px 0; font-weight: bold; cursor: pointer; font-size: 1.1rem;"
                    onclick="switchModTab('reports')">Reported Content</button>
                <button id="tabHistory" class="tab-btn"
                    style="background: none; border: none; color: grey; padding: 10px 0; font-weight: bold; cursor: pointer; font-size: 1.1rem;"
                    onclick="switchModTab('history')">Moderation History</button>
            </div>

            <!-- Pending Posts Table -->
            <div id="pendingPostsContainer">
                <table class="moderation-table">
                    <thead>
                        <tr>
                            <th>Title</th>
                            <th>Author</th>
                            <th>Date</th>
                            <th>Status</th>
                            <th>Reports</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody id="pendingPostsTable">
                        <tr>
                            <td colspan="6" style="text-align:center;">Loading...</td>
                        </tr>
                    </tbody>
                </table>
            </div>

            <!-- Reported Content Table -->
            <div id="reportedContentContainer" style="display: none;">
                <table class="moderation-table">
                    <thead>
                        <tr>
                            <th>Content ID & Type</th>
                            <th>Reason</th>
                            <th>Reporter</th>
                            <th>Date</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody id="reportsTable">
                        <tr>
                            <td colspan="5" style="text-align:center;">Loading...</td>
                        </tr>
                    </tbody>
                </table>
            </div>

            <!-- Moderation History Table -->
            <div id="historyContainer" style="display: none;">
                <table class="moderation-table">
                    <thead>
                        <tr>
                            <th>Moderator</th>
                            <th>Action</th>
                            <th>Date</th>
                            <th>Details</th>
                        </tr>
                    </thead>
                    <tbody id="historyTable">
                        <tr>
                            <td colspan="4" style="text-align:center;">Loading...</td>
                        </tr>
                    </tbody>
                </table>
            </div>

        </div>
    </div>

    <!-- Modal for Preview -->
    <div id="previewModal" class="checklist-modal-overlay" style="display: none;">
        <div class="checklist-modal" style="max-width: 800px;">
            <div class="checklist-modal-header">
                <h2>Post Preview</h2>
                <button onclick="document.getElementById('previewModal').style.display='none'"
                    class="close-btn">&times;</button>
            </div>
            <div class="checklist-modal-content" style="padding: 20px;">
                <h2 id="previewTitle"></h2>
                <p id="previewAuthor" style="color: grey; margin-bottom: 20px;"></p>
                <div id="previewContent" style="background: #222; padding: 15px; border-radius: 8px;"></div>
                <img id="previewImage" src="" style="width: 100%; margin-top: 15px; display: none;">
            </div>
        </div>
    </div>

    <script src="js/moderation.js"></script>
    <script>
        // Check Role
        const userStr = localStorage.getItem('user');
        let role = null;
        if (userStr) {
            try {
                const userObj = JSON.parse(userStr);
                role = userObj.role;

                // Update dashboard link based on role
                const dbLink = document.getElementById('dashboardLink');
                if (dbLink) {
                    if (role === 'admin') dbLink.href = 'admin-dashboard.html';
                    else if (role === 'trainer') dbLink.href = 'trainer-dashboard.html';
                    else dbLink.href = 'dashboard.html';
                }
            } catch (e) {
                console.error("Error parsing user from localStorage", e);
            }
        }

        if (role !== 'admin' && role !== 'trainer') {
            alert('Access Denied');
            window.location.href = 'blog.html';
        }
    </script>
</body>

</html>
