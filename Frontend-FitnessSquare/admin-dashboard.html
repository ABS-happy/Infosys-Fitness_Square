<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard | Fitness Square</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700;800;900&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>

<body class="dashboard-page admin-dashboard">
    <header id="header">
        <div class="container nav-container">
            <a href="index.html" class="logo">
                <img src="logo.png" alt="Fitness Square Logo" class="logo-img">
                FITNESS <span>SQUARE</span>
            </a>
            <nav class="nav-links">
                <div class="nav-separator"></div>
                <a href="#" id="logoutBtn" class="login-link"><i class="fas fa-sign-out-alt"></i> LOGOUT</a>
                <a href="admin-dashboard.html" class="btn btn-primary">Admin Panel</a>

            </nav>
            <div class="hamburger"><i class="fas fa-bars"></i></div>
        </div>
    </header>

    <div class="dashboard-container">
        <div class="dashboard-header">
            <h1>Platform Administration</h1>
            <p>Manage users, trainers, and platform health.</p>
            <div style="margin-top: 20px; display: flex; gap: 15px;">
                <a href="blog.html" class="tab-btn" style="text-decoration: none;"><i class="fas fa-users"
                        style="margin-right: 8px;"></i> View Community</a>
                <a href="moderator-dashboard.html" class="tab-btn"
                    style="text-decoration: none; background: #e67e22; border-color: #e67e22; color: #fff;"><i
                        class="fas fa-shield-alt" style="margin-right: 8px;"></i> Content Moderation</a>
            </div>
        </div>

        <div class="admin-stats stats-grid">
            <div class="stat-item vertical-card">
                <i class="fas fa-users-viewfinder"></i>
                <h2 id="totalUsers">0</h2>
                <p>Total Members</p>
            </div>
            <div class="stat-item vertical-card">
                <i class="fas fa-user-shield"></i>
                <h2 id="totalTrainers">0</h2>
                <p>Total Trainers</p>
            </div>
        </div>

        <div class="tabs">
            <button class="tab-btn active" onclick="switchAdminTab('members')">Members</button>
            <button class="tab-btn" onclick="switchAdminTab('trainers')">Trainers</button>
            <button class="tab-btn" onclick="switchAdminTab('requests')">Requests</button>
        </div>

        <div class="vertical-card admin-table-card">
            <div class="table-controls">
                <input type="text" id="adminSearch" placeholder="Search by name or email..." onkeyup="filterTable()">
            </div>
            <div class="table-responsive">
                <table id="adminTable">
                    <thead id="tableHead">
                        <tr>
                            <th>Name</th>
                            <th>Email</th>
                            <th>Age</th>
                            <th>Fitness Goals</th>
                            <th>Assigned Trainer</th>
                            <th>Status</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody id="tableBody">
                        <!-- Content injected by JS -->
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <script src="script.js?v=1.1"></script>
    <script>
        // API_BASE_URL is defined in script.js. Fallback if needed.
        const BASE_URL = typeof API_BASE_URL !== 'undefined' ? API_BASE_URL : 'http://localhost:5000';
        let currentTab = 'members';
        let allData = { members: [], trainers: [], requests: [] };

        document.addEventListener('DOMContentLoaded', () => {
            const token = localStorage.getItem('token');
            if (!token) { window.location.href = 'login.html'; return; }

            async function loadAdminData() {
                const token = localStorage.getItem('token');
                try {
                    const response = await fetch(`${BASE_URL}/api/admin/users`, {
                        headers: { 'Authorization': `Bearer ${token}` }
                    });

                    if (response.ok) {
                        const users = await response.json();
                        allData.members = users.filter(u => u.role === 'member');
                        allData.trainers = users.filter(u => u.role === 'trainer');

                        document.getElementById('totalUsers').innerText = allData.members.length;
                        document.getElementById('totalTrainers').innerText = allData.trainers.length;

                        renderTable();
                    }
                } catch (err) {
                    console.error('Admin data fetch error:', err);
                }
            }

            async function loadRequests() {
                const token = localStorage.getItem('token');
                try {
                    const res = await fetch(`${BASE_URL}/api/admin/requests`, {
                        headers: { 'Authorization': `Bearer ${token}` }
                    });
                    if (res.ok) {
                        allData.requests = await res.json();
                        if (currentTab === 'requests') renderTable();
                    }
                } catch (err) {
                    console.error('Error loading requests:', err);
                }
            }

            window.switchAdminTab = (tab) => {
                currentTab = tab;
                document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
                if (event && event.currentTarget) event.currentTarget.classList.add('active');
                updateTableHeaders();
                renderTable();
            };

            function updateTableHeaders() {
                const head = document.getElementById('tableHead');
                if (currentTab === 'members') {
                    head.innerHTML = `
                        <tr>
                            <th>Name</th>
                            <th>Email</th>
                            <th>Age</th>
                            <th>Fitness Goals</th>
                            <th>Assigned Trainer</th>
                            <th>Status</th>
                            <th>Actions</th>
                        </tr>
                    `;
                } else if (currentTab === 'trainers') {
                    head.innerHTML = `
                        <tr>
                            <th>Name</th>
                            <th>Email</th>
                            <th>Experience</th>
                            <th>Specialization</th>
                            <th>Clients</th>
                            <th>Actions</th>
                        </tr>
                    `;
                } else {
                    head.innerHTML = `
                        <tr>
                            <th>Member</th>
                            <th>Requested Trainer</th>
                            <th>Date</th>
                            <th>Status</th>
                            <th>Actions</th>
                        </tr>
                    `;
                }
            }

            function renderTable() {
                const body = document.getElementById('tableBody');
                const data = allData[currentTab];

                if (!data || data.length === 0) {
                    body.innerHTML = '<tr><td colspan="9" style="text-align:center;padding:30px;">No data available</td></tr>';
                    return;
                }

                if (currentTab === 'members') {
                    body.innerHTML = data.map(item => {
                        let statusText, statusClass;
                        if (!item.active) {
                            statusText = 'DEACTIVATED';
                            statusClass = 'status-deactivated';
                        } else if (item.isDailyActive) {
                            statusText = 'ACTIVE';
                            statusClass = 'status-active';
                        } else {
                            statusText = 'IDLE';
                            statusClass = 'status-idle';
                        }

                        return `
                        <tr id="row-${item.id}">
                            <td><strong>${item.fullname || item.username || 'N/A'}</strong></td>
                            <td>${item.email || 'N/A'}</td>
                            <td>${item.age || 'N/A'}</td>
                            <td>${Array.isArray(item.fitnessGoals) ? item.fitnessGoals.join(', ') : (item.fitnessGoals || 'Not set')}</td>
                            <td>${item.trainer ? item.trainer.fullname : '<span style="color:#ff9800;">Not Assigned</span>'}</td>
                            <td>
                                <div class="status-container">
                                    <span class="status-badge ${statusClass}">${statusText}</span>
                                </div>
                            </td>
                            <td>
                                <button class="action-btn ${item.active ? 'deactivate' : 'activate'}" onclick="toggleUserStatus('${item.id}', ${item.active})" title="${item.active ? 'Deactivate' : 'Activate'}">
                                    <i class="fas fa-${item.active ? 'ban' : 'check-circle'}"></i>
                                </button>
                                <button class="action-btn delete" onclick="deleteUser('${item.id}')" title="Delete">
                                    <i class="fas fa-trash"></i>
                                </button>
                            </td>
                        </tr>
                    `;
                    }).join('');
                } else if (currentTab === 'requests') {
                    body.innerHTML = data.map(item => `
                        <tr>
                            <td><strong>${item.member ? (item.member.fullname || item.member.email) : 'Unknown'}</strong></td>
                            <td>${item.requestedTrainer ? (item.requestedTrainer.fullname || item.requestedTrainer.email) : 'Unknown'}</td>
                            <td>${item.requestDate ? new Date(item.requestDate).toLocaleDateString() : 'N/A'}</td>
                            <td><span class="status-badge status-idle">${item.status}</span></td>
                            <td>
                                <button class="action-btn activate" onclick="handleRequest('${item.id}', 'approve')" title="Approve">
                                    <i class="fas fa-check-circle"></i>
                                </button>
                                <button class="action-btn delete" onclick="handleRequest('${item.id}', 'reject')" title="Reject">
                                    <i class="fas fa-times-circle"></i>
                                </button>
                            </td>
                        </tr>
                    `).join('');
                } else if (currentTab === 'trainers') {
                    body.innerHTML = data.map(item => `
                        <tr>
                            <td><strong>${item.fullname || item.username || 'N/A'}</strong></td>
                            <td>${item.email || 'N/A'}</td>
                            <td>${item.experience || 'N/A'}</td>
                            <td>${item.specialization || 'N/A'}</td>
                            <td>${item.assignedMembersCount || 0}</td>
                            <td>
                                <button class="action-btn delete" onclick="deleteUser('${item.id}')" title="Delete">
                                    <i class="fas fa-trash"></i>
                                </button>
                            </td>
                        </tr>
                    `).join('');
                }
            }

            window.handleRequest = async (id, action) => {
                const token = localStorage.getItem('token');
                try {
                    const res = await fetch(`${BASE_URL}/api/admin/requests/${id}/${action}`, {
                        method: 'PUT',
                        headers: { 'Authorization': `Bearer ${token}` }
                    });

                    if (res.ok) {
                        alert(`Request ${action}d successfully`);
                        loadRequests();
                    } else {
                        const data = await res.json();
                        alert(data.message || "Failed to update request");
                    }
                } catch (err) {
                    console.error('Error handling request:', err);
                }
            };

            window.toggleUserStatus = async (id, currentlyActive) => {
                const action = currentlyActive ? 'deactivate' : 'activate';
                if (confirm(`Are you sure you want to ${action} this user?`)) {
                    const token = localStorage.getItem('token');
                    try {
                        const res = await fetch(`${BASE_URL}/api/admin/users/${id}/status`, {
                            method: 'PUT',
                            headers: {
                                'Authorization': `Bearer ${token}`,
                                'Content-Type': 'application/json'
                            },
                            body: JSON.stringify({ active: !currentlyActive })
                        });
                        if (res.ok) {
                            alert(`User ${action}d successfully`);
                            loadAdminData();
                        }
                    } catch (err) {
                        console.error('Error:', err);
                    }
                }
            };

            window.deleteUser = async (id) => {
                if (confirm('ARE YOU SURE? This action cannot be undone.')) {
                    const token = localStorage.getItem('token');
                    try {
                        const res = await fetch(`${BASE_URL}/api/admin/users/${id}`, {
                            method: 'DELETE',
                            headers: { 'Authorization': `Bearer ${token}` }
                        });
                        if (res.ok) {
                            alert('User deleted successfully');
                            loadAdminData();
                        }
                    } catch (err) {
                        console.error('Error:', err);
                    }
                }
            };

            window.filterTable = () => {
                const q = document.getElementById('adminSearch').value.toLowerCase();
                const rows = document.querySelectorAll('#tableBody tr');
                rows.forEach(row => {
                    row.style.display = row.innerText.toLowerCase().includes(q) ? '' : 'none';
                });
            };

            loadAdminData();
            loadRequests();
        });
    </script>

    <style>
        .tabs {
            margin: 30px 0 20px;
            display: flex;
            gap: 10px;
        }

        .tab-btn {
            padding: 10px 30px;
            border-radius: 8px;
            background: #111;
            color: white;
            border: 1px solid #333;
            cursor: pointer;
            font-weight: 600;
        }

        .tab-btn.active {
            background: var(--primary);
            color: var(--dark);
            border-color: var(--primary);
        }

        .admin-table-card {
            padding: 0;
            overflow: hidden;
        }

        .table-controls {
            padding: 20px;
            border-bottom: 1px solid #333;
        }

        .table-controls input {
            width: 100%;
            max-width: 400px;
            padding: 10px;
            border-radius: 8px;
            background: #111;
            border: 1px solid #333;
            color: white;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        th {
            text-align: left;
            padding: 15px 20px;
            background: rgba(0, 0, 0, 0.05);
            color: #333;
            border-bottom: 1px solid #ddd;
        }

        td {
            padding: 15px 20px;
            border-bottom: 1px solid #eee;
            color: #000;
            font-weight: 500;
        }

        tr:hover {
            background: rgba(0, 0, 0, 0.02);
        }

        .action-btn {
            background: none;
            border: none;
            font-size: 1.1rem;
            cursor: pointer;
            padding: 5px 10px;
            transition: all 0.3s;
        }

        .deactivate {
            color: #ff9800;
        }

        .delete {
            color: #f44336;
        }

        .activate {
            color: #4caf50;
        }

        .action-btn:hover {
            transform: scale(1.2);
        }

        @media (max-width: 768px) {
            .table-responsive {
                overflow-x: auto;
            }
        }

        .status-container {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .status-detail {
            font-size: 0.7rem;
            color: #666;
            font-weight: 500;
        }

        .status-badge {
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.7rem;
            font-weight: 700;
            text-transform: uppercase;
            width: fit-content;
        }

        .status-active {
            background: rgba(76, 175, 80, 0.15);
            color: #2E7D32;
        }

        .status-idle {
            background: rgba(255, 193, 7, 0.15);
            color: #FF8F00;
        }

        .status-inactive {
            background: rgba(158, 158, 158, 0.2);
            color: #757575;
        }

        .status-deactivated {
            background: rgba(244, 67, 54, 0.15);
            color: #C62828;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
            margin-bottom: 30px;
        }

        .stat-item {
            display: flex;
            align-items: center;
            gap: 20px;
            padding: 25px;
        }

        .stat-item i {
            font-size: 2.5rem;
            color: var(--primary);
        }

        .stat-item h2 {
            font-size: 2rem;
            font-weight: 800;
        }

        .stat-item p {
            color: #888;
            font-size: 0.9rem;
        }
    </style>
</body>

</html>
